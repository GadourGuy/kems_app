name: kems_app
description: Event Management Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animations: ^2.0.7
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.18.1
  image_picker: ^1.0.5
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/